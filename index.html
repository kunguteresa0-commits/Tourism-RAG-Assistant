<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Adaptive Learning Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #2c3e50; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #2980b9; }
        #result { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
        .correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Submit Your Answer</h2>
    
    <div class="form-group">
        <label>Student ID</label>
        <input type="number" id="student_id" placeholder="e.g. 101">
    </div>
    
    <div class="form-group">
        <label>Topic</label>
        <input type="text" id="topic" placeholder="e.g. Quantum Physics">
    </div>

    <div class="form-group">
        <label>Question</label>
        <textarea id="question" rows="2"></textarea>
    </div>

    <div class="form-group">
        <label>Your Answer</label>
        <input type="text" id="student_answer">
    </div>

    <div class="form-group">
        <label>Correct Answer (for testing)</label>
        <input type="text" id="correct_answer">
    </div>

    <div class="form-group">
        <label>Time Taken (seconds)</label>
        <input type="number" id="time_taken" placeholder="e.g. 45">
    </div>

    <button onclick="submitData()">Submit Answer</button>

    <div id="result">
        <strong id="status-text"></strong>
        <p id="feedback-text"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
